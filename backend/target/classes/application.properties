# =============================================
# PostgreSQL - Supabase
# Substitua pelos seus dados do Supabase:
# Host: vai em Project Settings > Database > Connection string
# =============================================
spring.datasource.url=jdbc:postgresql://db.SEU_PROJETO.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=SUA_SENHA_SUPABASE
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# =============================================
# MongoDB - Local (ou Atlas)
# Para MongoDB local: mongodb://localhost:27017/delivery_db
# Para Atlas: mongodb+srv://usuario:senha@cluster.mongodb.net/delivery_db
# IMPORTANTE: Após subir o back, importe o cardapios.seed.json:
#   mongoimport --db delivery_db --collection cardapios --file cardapios.seed.json --jsonArray
# =============================================
spring.data.mongodb.uri=mongodb://localhost:27017/delivery_db

# =============================================
# Cassandra - Local
# Execute primeiro: cqlsh -f src/main/resources/cassandra_init.cql
# =============================================
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.keyspace-name=delivery_ks
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.schema-action=CREATE_IF_NOT_EXISTS

# =============================================
# Servidor
# =============================================
server.port=8080
